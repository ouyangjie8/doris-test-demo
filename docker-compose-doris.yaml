version: "3"
services:
  fe:
    image: apache/doris:fe-4.0.1
    hostname: fe
    environment:
     - FE_SERVERS=fe1:127.0.0.1:9010
     - FE_ID=1
     - _JAVA_OPTIONS=-Xms512m -Xmx1024m
     - JAVA_TOOL_OPTIONS=-Xms512m -Xmx1024m
    network_mode: host
  be:
    image: apache/doris:be-4.0.1
    hostname: be
    environment:
     - FE_SERVERS=fe1:127.0.0.1:9010
     - BE_ADDR=127.0.0.1:9050
     - _JAVA_OPTIONS=-Xms512m -Xmx1024m
     - JAVA_TOOL_OPTIONS=-Xms512m -Xmx1024m
    depends_on:
      - fe
    network_mode: host
